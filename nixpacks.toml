# Force Python detection for Railway/Nixpacks
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "postgresql"]

[phases.install]
cmds = ["python -m pip install --upgrade pip", "pip install -e ."]

[start]
cmd = "alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
